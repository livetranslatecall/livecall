let supabase, channel, pc, localStream;

const translateCache = new Map();

/* =========================================================================
   FORDÍTÁS — MyMemory API
   ========================================================================= */
async function translateText(text, sourceLang, targetLang) {
  if (!text || sourceLang === targetLang) return text;
  const key = `${sourceLang}|${targetLang}|${text}`;
  if (translateCache.has(key)) return translateCache.get(key);
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const translated = data?.responseData?.translatedText || text;
    translateCache.set(key, translated);
    return translated;
  } catch (e) {
    console.error("Fordítási hiba:", e);
    return text;
  }
}

/* =========================================================================
   SEGÉDFÜGGVÉNYEK
   ========================================================================= */
function randomCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function cryptoId() {
  // crypto.randomUUID() ha elérhető, különben fallback
  if (typeof crypto !== "undefined" && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return "u-" + Math.random().toString(36).slice(2, 18);
}

/* =========================================================================
   SUPABASE CSATORNA
   ========================================================================= */
async function setupChannel(code) {
  channel = supabase.channel("call-room-" + code, {
    config: {
      broadcast: { self: false },
      presence:  { key: cryptoId() }
    }
  });

  channel.on("broadcast", { event: "signal"  }, ({ payload }) => handleSignal(payload));
  channel.on("broadcast", { event: "caption" }, ({ payload }) => handleIncomingCaption(payload));
  channel.on("broadcast", { event: "chat"    }, ({ payload }) => handleIncomingChat(payload));

  channel.on("presence", { event: "sync" }, () => {
    const state = channel.presenceState();
    const count = Object.keys(state).length;
    if (count >= 2 && isInitiator && pc && !pc.currentLocalDescription) {
      startCallAsInitiator();
    }
  });

  channel.on("broadcast", { event: "signal" }, ({ payload }) => {
    if (payload.kind === "request-offer" && isInitiator && pc && !pc.currentLocalDescription) {
      startCallAsInitiator();
    }
  });

await channel.subscribe(async (status) => {
    if (status === "SUBSCRIBED") {
      await channel.track({ name: myName || "Vendég", lang: myLang, initiator: isInitiator });

      if (!isInitiator) {
        setTimeout(() => {
          channel.send({
            type: "broadcast",
            event: "signal",
            payload: { kind: "request-offer" }
          });
        }, 800);
      }
    }
  });
}


/* =========================================================================
   WEBRTC
   ========================================================================= */
async function initMedia() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cameras = devices.filter(d => d.kind === "videoinput");
    const preferred = cameras.find(d =>
      d.label.toLowerCase().includes("integrated") ||
      d.label.toLowerCase().includes("integrated camera") ||
      d.label.toLowerCase().includes("beépített") ||
      d.label.toLowerCase().includes("webcam")
    );
    const videoConstraint = preferred
      ? { deviceId: { exact: preferred.deviceId } }
      : { facingMode: "user" };

    localStream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraint,
      audio: true
    });
    localVideo.srcObject = localStream;
  } catch (err) {
    console.error("Kamera/mikrofon hiba:", err);
    setupStatus.textContent = "❌ Nincs engedély a kamerához/mikrofonhoz!";
    throw err;
  }
}

function createPeerConnection() {
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

  pc.ontrack = (event) => {
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
    }
  };

  pc.onicecandidate = (event) => {
    if (event.candidate && channel) {
      channel.send({
        type: "broadcast",
        event: "signal",
        payload: { kind: "ice", candidate: event.candidate }
      });
    }
  };

  pc.onconnectionstatechange = () => {
    const state = pc.connectionState;
    console.log("PC állapot:", state);
    if (state === "failed") {
      setupStatus.textContent = "⚠️ A kapcsolat meghiúsult.";
    } else if (state === "disconnected") {
      setupStatus.textContent = "⚠️ A kapcsolat megszakadt.";
    } else if (state === "connected") {
      setupStatus.textContent = "";
    }
  };

  pc.onicecandidateerror = (event) => {
    // Nem minden ICE hiba végzetes; csak logoljuk
    console.warn("ICE candidate hiba:", event.errorCode, event.errorText);
  };
}

async function startCallAsInitiator() {
  if (!pc) return;
  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    channel.send({
      type: "broadcast",
      event: "signal",
      payload: { kind: "offer", sdp: offer }
    });
  } catch (err) {
    console.error("Offer létrehozási hiba:", err);
  }
}

async function handleSignal(payload) {
  if (!pc) return;
  try {
    if (payload.kind === "offer") {
      // Biztonságos: csak akkor fogadjuk, ha még nincs remote leíró
      if (pc.signalingState !== "stable") {
        console.warn("Offer érkezett, de a signaling állapot:", pc.signalingState);
        return;
      }
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      remoteDescSet = true;
      await flushPendingCandidates();
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      channel.send({
        type: "broadcast",
        event: "signal",
        payload: { kind: "answer", sdp: answer }
      });

    } else if (payload.kind === "answer") {
      if (pc.signalingState !== "have-local-offer") {
        console.warn("Answer érkezett, de a signaling állapot:", pc.signalingState);
        return;
      }
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      remoteDescSet = true;
      await flushPendingCandidates();

    } else if (payload.kind === "ice") {
      if (remoteDescSet && pc.remoteDescription) {
        try {
          await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
        } catch (e) {
          console.warn("ICE candidate hozzáadási hiba:", e);
        }
      } else {
        pendingCandidates.push(payload.candidate);
      }
    }
  } catch (err) {
    console.error("Signal feldolgozási hiba:", err);
  }
}

async function flushPendingCandidates() {
  for (const c of pendingCandidates) {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(c));
    } catch (e) {
      console.warn("Függőben lévő ICE candidate hiba:", e);
    }
  }
  pendingCandidates = [];
}

/* =========================================================================
   HANGFELISMERÉS (STT)
   ========================================================================= */
function startRecognition() {
  if (!micOn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    console.warn("Web Speech API nem támogatott ezen a böngészőn.");
    return;
  }
  // Ha már fut, ne indítsuk újra
  if (recognition) {
    try { recognition.stop(); } catch (_) {}
    recognition = null;
  }
  try {
    recognition = new SR();
    recognition.lang            = STT_LOCALE[myLang] || "hu-HU";
    recognition.continuous      = true;
    recognition.interimResults  = true;
    recognitionShouldRun        = true;

    recognition.onresult = async (event) => {
      let finalTranscript = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        if (res.isFinal) {
          finalTranscript += res[0].transcript;
        } else {
          ownBox.style.display = "block";
          ownMain.textContent  = res[0].transcript;
        }
      }
      if (finalTranscript.trim()) {
        ownBox.style.display = "block";
        ownMain.textContent  = finalTranscript.trim();
        if (channel) {
          channel.send({
            type: "broadcast",
            event: "caption",
            payload: {
              text:       finalTranscript.trim(),
              sourceLang: myLang,
              name:       myName || LANG_LABEL[myLang]
            }
          });
        }
        setTimeout(() => { ownBox.style.display = "none"; }, 4000);
      }
    };

    recognition.onerror = (e) => {
      // "no-speech" és "aborted" nem végzetes
      if (e.error !== "no-speech" && e.error !== "aborted") {
        console.warn("STT hiba:", e.error);
      }
    };

    recognition.onend = () => {
      if (recognitionShouldRun && micOn && !callEnded) {
        try { recognition.start(); } catch (_) {}
      }
    };

    recognition.start();
  } catch (err) {
    console.warn("STT indítási hiba:", err);
  }
}

function stopRecognition() {
  recognitionShouldRun = false;
  if (recognition) {
    try { recognition.stop(); } catch (_) {}
    recognition = null;
  }
}

/* =========================================================================
   FELIRATOK
   ========================================================================= */
async function handleIncomingCaption(payload) {
  if (!payload || !payload.text) return;
  try {
    const translated = await translateText(
      payload.text,
      payload.sourceLang || "hu",
      myLang
    );
    incomingTag.textContent  = (payload.name || LANG_LABEL[payload.sourceLang] || "PARTNER").toUpperCase();
    incomingMain.textContent = translated;
    incomingSub.textContent  = (payload.sourceLang && payload.sourceLang !== myLang)
      ? `„${payload.text}" (${LANG_LABEL[payload.sourceLang] || payload.sourceLang})`
      : "";
    incomingBox.style.display = "block";
    clearTimeout(captionHideTimer);
    captionHideTimer = setTimeout(() => { incomingBox.style.display = "none"; }, 7000);
  } catch (err) {
    console.error("Felirat feldolgozási hiba:", err);
  }
}

/* =========================================================================
   CHAT
   ========================================================================= */
function addChatBubble(text, sub, isMe) {
  const wrap   = document.createElement("div");
  wrap.className = "msg" + (isMe ? " me" : "");

  const bubble = document.createElement("div");
  bubble.className   = "msg-bubble";
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (sub) {
    const s = document.createElement("div");
    s.className   = "msg-orig";
    s.textContent = sub;
    wrap.appendChild(s);
  }

  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function handleIncomingChat(payload) {
  if (!payload || !payload.text) return;
  try {
    const translated = await translateText(
      payload.text,
      payload.sourceLang || "hu",
      myLang
    );
    const sub = (payload.sourceLang && payload.sourceLang !== myLang)
      ? `eredeti: „${payload.text}"`
      : "";
    addChatBubble(translated, sub, false);
  } catch (err) {
    console.error("Chat feldolgozási hiba:", err);
  }
}

function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !channel) return;
  addChatBubble(text, "", true);
  channel.send({
    type: "broadcast",
    event: "chat",
    payload: { text, sourceLang: myLang }
  });
  chatInput.value = "";
}

/* =========================================================================
   HÍVÁS INDÍTÁSA
   ========================================================================= */
async function beginCallFlow() {
  callEnded = false;
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await initMedia();
    createPeerConnection();
    await setupChannel(roomId);

    roomPill.textContent = "Szoba: " + roomId;
    langPill.textContent = LANG_TAG[myLang] || "HU";

    setupScreen.classList.remove("active");
    callScreen.classList.add("active");

    startRecognition();
  } catch (err) {
    console.error("Hívásindítási hiba:", err);
    setupStatus.textContent = "❌ Hiba: " + (err.message || "Nem sikerült elindítani a hívást.");
  }
}

/* =========================================================================
   UI ESEMÉNYKEZELŐK — Setup
   ========================================================================= */
createRoomBtn.onclick = async () => {
  myName       = myNameInput.value.trim();
  myLang       = myLangSelect.value;
  roomId       = randomCode();
  isInitiator  = true;

  bigRoomCode.textContent        = roomId;
  roomCodeDisplay.style.display  = "block";
  setupStatus.textContent        = "Várakozás a másik félre…";

  createRoomBtn.disabled = true;
  joinRoomBtn.disabled   = true;

  await beginCallFlow();
};

joinRoomBtn.onclick = async () => {
  const code = joinCodeInput.value.trim().toUpperCase();
  if (code.length < 4) {
    setupStatus.textContent = "Írd be a kapott kódot (4–6 karakter).";
    return;
  }
  myName      = myNameInput.value.trim();
  myLang      = myLangSelect.value;
  roomId      = code;
  isInitiator = false;
  setupStatus.textContent = "Csatlakozás…";

  createRoomBtn.disabled = true;
  joinRoomBtn.disabled   = true;

  await beginCallFlow();
};

copyCodeBtn.onclick = () => {
  if (!roomId) return;
  navigator.clipboard.writeText(roomId)
    .then(() => {
      copyCodeBtn.textContent = "✅ Másolva";
      setTimeout(() => { copyCodeBtn.textContent = "📋 Kód másolása"; }, 1500);
    })
    .catch(() => {
      // Fallback régi böngészőkre
      const ta = document.createElement("textarea");
      ta.value = roomId;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      copyCodeBtn.textContent = "✅ Másolva";
      setTimeout(() => { copyCodeBtn.textContent = "📋 Kód másolása"; }, 1500);
    });
};

/* =========================================================================
   UI ESEMÉNYKEZELŐK — Hívás
   ========================================================================= */
micBtn.onclick = () => {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach((t) => { t.enabled = micOn; });
  micBtn.classList.toggle("off", !micOn);
  micBtn.textContent = micOn ? "🎙️" : "🔇";
  if (micOn) startRecognition();
  else        stopRecognition();
};

camBtn.onclick = () => {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach((t) => { t.enabled = camOn; });
  camBtn.classList.toggle("off", !camOn);
  camBtn.textContent = camOn ? "📷" : "🚫";
};

langBtn.onclick = (e) => {
  e.stopPropagation();
  langMenu.classList.toggle("open");
};

// Menü bezárása ha máshova kattintanak
document.addEventListener("click", (e) => {
  if (!langMenu.contains(e.target) && e.target !== langBtn) {
    langMenu.classList.remove("open");
  }
});

langMenu.querySelectorAll("button").forEach((btn) => {
  btn.onclick = () => {
    myLang = btn.dataset.lang;
    langPill.textContent = LANG_TAG[myLang] || "HU";
    langMenu.querySelectorAll("button").forEach((b) => {
      b.classList.toggle("active", b === btn);
    });
    langMenu.classList.remove("open");
    stopRecognition();
    startRecognition();
    if (channel) {
      channel.track({ name: myName || "Vendég", lang: myLang, initiator: isInitiator });
    }
  };
});

chatBtn.onclick    = () => chatPanel.classList.add("open");
chatCloseBtn.onclick = () => chatPanel.classList.remove("open");
chatSendBtn.onclick  = sendChat;
chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });

hangupBtn.onclick = () => {
  callEnded = true;
  stopRecognition();

  if (pc) {
    pc.close();
    pc = null;
  }
  if (channel) {
    supabase.removeChannel(channel);
    channel = null;
  }
  if (localStream) {
    localStream.getTracks().forEach((t) => t.stop());
    localStream = null;
  }

  remoteVideo.srcObject = null;
  localVideo.srcObject  = null;
  remoteDescSet         = false;
  pendingCandidates     = [];
  translateCache.clear();
  chatMessages.innerHTML = "";

  callScreen.classList.remove("active");
  setupScreen.classList.add("active");

  roomCodeDisplay.style.display = "none";
  setupStatus.textContent       = "A hívás véget ért.";

  // Gombok újra engedélyezése
  createRoomBtn.disabled = false;
  joinRoomBtn.disabled   = false;
};

   SERVICE WORKER
   ========================================================================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("SW regisztrálva"))
      .catch((e) => console.warn("SW regisztráció sikertelen:", e));
  });
}
